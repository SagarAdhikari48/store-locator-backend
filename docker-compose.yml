services:
  postgres:
    image: postgres:16
    container_name: restaurant_store_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: restaurant_store_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: